services:
  - type: web
    name: bloghub-backend
    runtime: java
    rootDir: backend
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/BlogHub-0.0.1-SNAPSHOT.jar
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DDL_AUTO
        value: update
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: SESSION_COOKIE_SAME_SITE
        value: none
      - key: FRONTEND_ORIGIN
        value: https://bloghub-frontend.onrender.com

  - type: web
    name: bloghub-frontend
    runtime: static
    rootDir: frontend
    buildCommand: ""
    staticPublishPath: .
    headers:
      - path: "/*"
        name: Cache-Control
        value: no-cache
