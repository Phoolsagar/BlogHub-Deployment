spring.application.name=BlogginApp
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/BlogHub}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:phool}
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.max-age=1800
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:none}
server.servlet.session.coolkie.path=/
servlet.servlet.session.cookie.name=JSESSIONID

app.cors.allowed-origin=${FRONTEND_ORIGIN:http://localhost:5500}

server.port=${PORT:8082}