<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <script>(function () { var t = localStorage.getItem('theme') || 'light'; document.documentElement.setAttribute('data-theme', t); })();</script>
  <title>Update Post</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <style>
    /* Form Container */
    .form-container {
      max-width: 700px;
      margin: 3rem auto;
      padding: 2.5rem;
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
    }

    .form-container h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: var(--primary-color);
    }

    label {
      display: block;
      font-weight: 600;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-size: 1rem;
      transition: border-color 0.3s, box-shadow 0.3s;
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      outline: none;
    }

    .form-container button {
      margin-top: 2rem;
      width: 100%;
      padding: 0.85rem;
      background-color: var(--primary-color);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 1.1rem;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .form-container button:hover {
      background-color: var(--primary-dark);
    }

    #alert-container {
      margin-bottom: 1rem;
      text-align: center;
      font-weight: 600;
    }

    .alert-success {
      color: var(--secondary-color);
    }

    .alert-error {
      color: var(--danger-color);
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <header class="navbar">
    <div class="nav-container">
      <div class="nav-brand">
        <i class="fas fa-feather-alt"></i>
        <h1>BlogHub</h1>
      </div>
      <nav class="nav-menu">
        <a href="index.html" class="nav-link">Home</a>
        <a href="posts.html" class="nav-link">All Posts</a>
        <a href="categories.html" class="nav-link">Categories</a>
        <a href="post-create.html" class="nav-link">Create Post</a>
        <a href="users.html" class="nav-link admin-only">Users</a>
        <a href="category-create.html" class="nav-link admin-only">Create Category</a>
      </nav>
      <div class="nav-actions">
        <button class="theme-toggle" onclick="toggleTheme()">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </div>
  </header>

  <!--From-->
  <main class="form-container">
    <h2>Update Post</h2>
    <div id="alert-container"></div>

    <form id="update-post-form">
      <input type="hidden" id="postId" />

      <label>Title</label>
      <input type="text" id="title" required />

      <label>Content</label>
      <textarea id="content" rows="5" required></textarea>

      <label>Category</label>
      <select id="category" required>
        <option value="">-- Select Category --</option>
      </select>

      <label>Author</label>
      <input type="text" id="authorName" readonly />

      <button type="submit">Update</button>
    </form>
  </main>

  <script src="js/main.js"></script>
  <script src="js/post-update.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      if (!sessionStorage.getItem("userName")) {
        window.location.href = "login.html";
      }
      updateNavbar();
      applyRoleBasedUI();
    });
  </script>
</body>

</html>
